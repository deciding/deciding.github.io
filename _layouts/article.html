layout: default
---
<h1>{{ page.title }}</h1>
<div class="article-meta">
  <span class="date">{{ page.date | date: "%B %d, %Y" }}</span>
</div>
<div class="article-content">
  {{ content }}
</div>
<div class="article-footer">
  <a href="{{ '/articles' | relative_url }}" class="back-btn">&larr; Back to Articles</a>
</div>
