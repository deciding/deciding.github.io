<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>{{ page.title }} - {{ site.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <div class="container">
    <aside class="sidebar">
      <div class="profile">
        <div class="avatar"></div>
        <h2>{{ site.author.name }}</h2>
        <p class="affiliation">{{ site.author.affiliation }}</p>
        <p class="location">📍 {{ site.author.title }}</p>
        <div class="tags">
          {% for tag in site.author.tags %}
            <span class="tag">{{ tag }}</span>
          {% endfor %}
        </div>
      </div>
      <nav class="sidebar-nav">
        <ul>
          <li><a href="{{ '/' | relative_url }}">Articles</a></li>
          <li><a href="{{ '/publications' | relative_url }}">Publications</a></li>
        </ul>
      </nav>
      <div class="social-links">
        <a href="https://github.com/{{ site.author.github }}" target="_blank">GitHub</a>
        <a href="https://x.com/{{ site.author.twitter }}" target="_blank">X</a>
        <a href="https://www.zhihu.com/people/{{ site.author.zhihu }}" target="_blank">知乎</a>
      </div>
    </aside>
    <main class="content">
      {{ content }}
    </main>
  </div>
</body>
</html>
