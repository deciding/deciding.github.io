<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} - {{ site.title }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Merriweather:ital,wght@0,400;0,700;1,400&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/style.css?v=6' | relative_url }}">
</head>
<body data-theme="night">
  <header class="header">
    <div class="header-left">
      <a href="{{ '/' | relative_url }}" class="logo-link">
        <img src="{{ '/assets/logo.jpg' | relative_url }}" alt="Logo" class="logo">
      </a>
      <div class="header-text">
        <a href="{{ '/' | relative_url }}" class="logo-link">
          <span class="author-name">{{ site.author.name }}</span>
        </a>
        <span class="affiliation">{{ site.author.affiliation }}</span>
      </div>
    </div>
    <nav class="header-nav">
      <a href="{{ '/' | relative_url }}">Articles</a>
      <a href="{{ '/publications' | relative_url }}">Publications</a>
      <a href="{{ '/projects' | relative_url }}">Projects</a>
    </nav>
    <div class="header-links">
      <a href="https://github.com/{{ site.author.github }}" target="_blank">GitHub</a>
      <a href="https://x.com/{{ site.author.twitter }}" target="_blank">X</a>
      <a href="https://www.zhihu.com/people/{{ site.author.zhihu }}" target="_blank">知乎</a>
      <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme">
        <span class="theme-icon">☀️</span>
      </button>
    </div>
  </header>
  <main class="main-content">
    {{ content }}
  </main>
  <script>
    function toggleTheme() {
      const body = document.body;
      const current = body.getAttribute('data-theme');
      const next = current === 'night' ? 'day' : 'night';
      body.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
      updateThemeIcon();
    }
    function updateThemeIcon() {
      const icon = document.querySelector('.theme-icon');
      if (document.body.getAttribute('data-theme') === 'night') {
        icon.textContent = '☀️';
      } else {
        icon.textContent = '🌙';
      }
    }
    const saved = localStorage.getItem('theme');
    if (saved) {
      document.body.setAttribute('data-theme', saved);
    }
    updateThemeIcon();
  </script>
</body>
</html>
